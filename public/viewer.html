<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여기양 - 위치 보기</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif; }
    #map { height: 100vh; width: 100%; }
    .panel {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 1000;
      background: rgba(255,255,255,0.96); border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2); max-width: 460px; margin: 0 auto;
    }
    .title { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
    .status { font-size: 13px; color: #555; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #ccc; margin-right: 6px; }
    .dot.live { background: #2ecc71; box-shadow: 0 0 0 4px rgba(46,204,113,.25); }
    .meta { font-size: 12px; color: #888; margin-top: 6px; }
    .recenter {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000;
      width: 52px; height: 52px; border-radius: 50%; border: none; background: #4ecdc4;
      color: #053b37; font-size: 22px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    .off-beauty-label {
      background: #6a0dad; color: #fff; font-weight: 800; font-size: 14px;
      padding: 4px 10px; border-radius: 8px; border: none; box-shadow: 0 3px 8px rgba(0,0,0,.3);
    }
    .off-beauty-label::before { border-top-color: #6a0dad !important; }
    .off-beauty-pin { filter: drop-shadow(0 4px 6px rgba(0,0,0,.4)); }
    .sheep-pin { filter: drop-shadow(0 2px 3px rgba(0,0,0,.35)); }
    .off-beauty-pin { cursor: default; background: transparent !important; border: none !important; }
    .off-beauty-pin.clickable { cursor: pointer; }
    /* OFF BEAUTY 토끼 이미지 마커 + 눈 깜빡임 */
    .ob-rabbit { position: relative; width: 100%; height: 100%; }
    .ob-rabbit img { width: 100%; height: 100%; display: block; -webkit-user-drag: none; user-select: none; }
    .ob-eyelid {
      position: absolute; width: 8%; height: 8%;
      background: #49474f; border-radius: 45% 45% 48% 48%;
      transform: scaleY(0); transform-origin: top center;
      animation: ob-blink 3s ease-in-out infinite;
      pointer-events: none;
    }
    .ob-eye-l { left: 33.6%; top: 41.3%; }
    .ob-eye-r { left: 56.9%; top: 41.3%; }
    @keyframes ob-blink {
      0%, 90%, 100% { transform: scaleY(0); }
      93%, 96%      { transform: scaleY(1); }
    }
    @media (prefers-reduced-motion: reduce) { .ob-eyelid { animation: none; } }
    /* 팝업스토어 정보 모달 */
    .popup-overlay {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.55); padding: 20px;
      align-items: center; justify-content: center;
    }
    .popup-overlay.show { display: flex; }
    .popup-box {
      position: relative; width: 100%; max-width: 420px;
      background: #fff; border-radius: 20px; padding: 26px 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35); text-align: center;
      max-height: 86vh; overflow: auto;
    }
    .popup-close {
      position: absolute; top: 12px; right: 14px; width: 34px; height: 34px;
      border: none; background: #f1f1f4; border-radius: 50%; font-size: 20px;
      color: #555; cursor: pointer; line-height: 1;
    }
    .popup-emoji { font-size: 46px; margin: 4px 0 6px; }
    .popup-title { font-size: 21px; font-weight: 800; color: #6a0dad; margin: 0 0 14px; }
    .popup-row { font-size: 15px; color: #333; margin: 7px 0; line-height: 1.5; }
    .popup-row b { color: #111; }
    .popup-desc { font-size: 14px; color: #555; line-height: 1.7; margin: 14px 0 4px; white-space: pre-line; }
    .popup-btn {
      display: inline-block; margin-top: 18px; padding: 13px 22px; border-radius: 12px;
      background: #6a0dad; color: #fff; font-weight: 700; font-size: 15px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="title">📍 여기양 — 위치 보기</div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">호스트 연결 대기 중…</span></div>
    <div class="status" id="viewersLine" style="margin-top:4px;">👀 <strong id="viewerCount">0</strong>명이 함께 보는 중</div>
    <div class="meta" id="meta"></div>
    <div class="meta" id="rabbitHint" style="margin-top:2px;display:none;">🐰 OFF BEAUTY 토끼를 누르면 팝업스토어 정보가 나와요</div>
  </div>
  <div id="map"></div>
  <button class="recenter" id="recenterBtn" onclick="recenter()" title="호스트 위치로 이동">🎯</button>

  <!-- OFF BEAUTY 팝업스토어 정보 모달 (7/11~12 토끼 클릭 시) -->
  <div class="popup-overlay" id="popupOverlay" onclick="closeModal(event)">
    <div class="popup-box" onclick="event.stopPropagation()">
      <button class="popup-close" onclick="closeModal()" aria-label="닫기">×</button>
      <div id="popupContent"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // room 파라미터 없으면 고정 방(OFFBEAUTY)으로 — 시청자 고정 URL 지원
    const room = (new URLSearchParams(location.search).get("room") || "OFFBEAUTY").toUpperCase();

    // ▼▼ OFF BEAUTY 위치 (서울 성동구 연무장3길 9, 오프뷰티 성수메가팩토리점 — 카카오맵 정확 좌표) ▼▼
    const OFF_BEAUTY = { lat: 37.54439814, lng: 127.0513618, name: "OFF BEAUTY" };
    // ▲▲ ----------------------------------------------------------------------------------- ▲▲

    // ===== 기간별 동작 (한국 표준시 KST 기준) =====
    //  ~7/10  : 실시간 위치추적(tracking)
    //  7/11~12: 추적 중단, 토끼 클릭 시 팝업스토어 정보(popup)
    //  7/13~  : 추적 중단, 토끼 클릭 시 종료 안내(ended)
    function nowKST() {
      const now = new Date();
      return new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000); // UTC+9
    }
    function currentPhase() {
      const d = nowKST();
      const ymd = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
      if (ymd <= 20260710) return "tracking";
      if (ymd <= 20260712) return "popup";
      return "ended";
    }
    // ?preview=tracking|popup|ended 로 강제 미리보기 (평소엔 영향 없음)
    const _preview = (new URLSearchParams(location.search).get("preview") || "").toLowerCase();
    const PHASE = (["tracking", "popup", "ended"].indexOf(_preview) >= 0) ? _preview : currentPhase();

    // ▼▼ 팝업스토어 정보 — 실제 내용으로 이 블록만 교체하면 됩니다 ▼▼
    const POPUP_INFO = {
      title: "OFF BEAUTY 팝업스토어",
      dateText: "7월 11일(토) ~ 7월 12일(일)",
      hours: "11:00 ~ 20:00",
      place: "OFF BEAUTY 성수메가팩토리점",
      address: "서울 성동구 연무장3길 9",
      desc: "여기양과 함께한 이벤트가 마무리됩니다!\n7/11~12 OFF BEAUTY 팝업스토어에서 만나요 💜",
      link: "https://offbeauty-percent.com/",
    };
    // ▲▲ ----------------------------------------------------------------------------------- ▲▲

    const map = L.map("map").setView([OFF_BEAUTY.lat, OFF_BEAUTY.lng], 16);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19,
    }).addTo(map);

    // 픽셀아트 아이콘 생성기 (도트맵 → SVG rect, 확대해도 선명)
    function makePixelIcon(px, colors, opts = {}) {
      const scale = opts.scale || 4;
      const W = px[0].length * scale, H = px.length * scale;
      let rects = "";
      for (let r = 0; r < px.length; r++) {
        for (let c = 0; c < px[r].length; c++) {
          const ch = px[r][c];
          if (ch === ".") continue;
          rects += `<rect x="${c * scale}" y="${r * scale}" width="${scale}" height="${scale}" fill="${colors[ch] || "#000"}"/>`;
        }
      }
      const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
      return L.divIcon({
        className: opts.className || "pixel-pin",
        html: svg,
        iconSize: [W, H],
        iconAnchor: opts.iconAnchor || [W / 2, H - scale * 2],
      });
    }

    // OFF BEAUTY 매장: 토끼 캐릭터 이미지 핀 (눈 깜빡임 모션, 매장명 라벨 유지)
    const RABBIT_W = 160, RABBIT_H = 214; // 원본 1086x1448 비율(≈0.75), 2배 크기
    const offBeautyIcon = L.divIcon({
      className: "off-beauty-pin",
      html:
        '<div class="ob-rabbit">' +
          '<img src="/off-beauty-rabbit.png" alt="OFF BEAUTY" draggable="false" />' +
          '<span class="ob-eyelid ob-eye-l"></span>' +
          '<span class="ob-eyelid ob-eye-r"></span>' +
        '</div>',
      iconSize: [RABBIT_W, RABBIT_H],
      iconAnchor: [RABBIT_W / 2, RABBIT_H - 4],
    });
    const offBeautyMarker = L.marker([OFF_BEAUTY.lat, OFF_BEAUTY.lng], { icon: offBeautyIcon, zIndexOffset: 1000 })
      .addTo(map)
      .bindTooltip(OFF_BEAUTY.name, {
        permanent: true, direction: "top", offset: [0, -208], className: "off-beauty-label",
      });
    // 언제든 토끼 로고를 누르면 팝업스토어 정보(또는 7/13~ 종료 안내)가 뜬다
    offBeautyMarker.on("click", () => openModal());
    const _obEl = offBeautyMarker.getElement();
    if (_obEl) _obEl.classList.add("clickable");

    // 호스트 위치: 귀여운 양 픽셀아트
    const SHEEP = {
      px: [
        ".....WWWWWW.....",
        "...WWWWWWWWWW...",
        "..WWWWWWWWWWWW..",
        "..WWWWWWWWWWWW..",
        ".WWWDDDDDDDDWWW.",
        ".WWDDDDDDDDDDWW.",
        ".WWDeeDDDDeeDWW.",
        ".WWDDDDDDDDDDWW.",
        ".WWDpDDDDDDpDWW.",
        ".WWDDDDDDDDDDWW.",
        "..WWDDDDDDDDWW..",
        "..WWWWWWWWWWWW..",
        "...WWWWWWWWWW...",
        "...DD......DD...",
        "...DD......DD...",
        "................",
      ],
      colors: { W: "#fafafa", D: "#2e2e2e", e: "#ffffff", p: "#ff9ab0" },
    };
    const sheepIcon = makePixelIcon(SHEEP.px, SHEEP.colors, { scale: 4, className: "sheep-pin" });

    let marker = null, accCircle = null, lastLatLng = null, autoFollow = true;
    map.on("dragstart", () => { autoFollow = false; });

    let socket = null;
    if (PHASE === "tracking") {
      document.getElementById("rabbitHint").style.display = "block";
      socket = io();
      socket.on("connect", () => socket.emit("viewer:join", { room }));
      socket.on("viewer:joined", ({ hostOnline, lastLocation }) => {
        setStatus(hostOnline);
        if (lastLocation) render(lastLocation);
      });
      socket.on("location:update", (loc) => { setStatus(true); render(loc); });
      socket.on("host:offline", () => setStatus(false));
      socket.on("error:msg", (m) => alert(m));
      socket.on("room:stats", ({ viewerCount }) => {
        if (typeof viewerCount === "number") {
          document.getElementById("viewerCount").textContent = viewerCount;
        }
      });
    } else {
      applyEventPanel();
    }

    // 추적 종료 기간(7/11~)의 안내 패널
    function applyEventPanel() {
      document.getElementById("viewersLine").style.display = "none";
      document.getElementById("recenterBtn").style.display = "none";
      const st = document.getElementById("statusText");
      const meta = document.getElementById("meta");
      if (PHASE === "popup") {
        st.textContent = "OFF BEAUTY 팝업스토어 기간";
        meta.textContent = "🐰 토끼 로고를 누르면 팝업스토어 정보가 나와요";
      } else {
        st.textContent = "이벤트가 종료되었습니다";
        meta.textContent = "🐰 토끼 로고를 눌러 안내를 확인하세요";
      }
    }

    // ===== 팝업스토어 정보 / 종료 안내 모달 =====
    function openModal() {
      const c = document.getElementById("popupContent");
      if (PHASE !== "ended") {
        const p = POPUP_INFO;
        c.innerHTML =
          '<div class="popup-emoji">🐰💜</div>' +
          '<h2 class="popup-title">' + esc(p.title) + '</h2>' +
          '<div class="popup-row">📅 <b>' + esc(p.dateText) + '</b></div>' +
          '<div class="popup-row">🕚 ' + esc(p.hours) + '</div>' +
          '<div class="popup-row">📍 ' + esc(p.place) + '</div>' +
          '<div class="popup-row">' + esc(p.address) + '</div>' +
          '<div class="popup-desc">' + esc(p.desc) + '</div>' +
          (p.link ? '<a class="popup-btn" href="' + esc(p.link) + '" target="_blank" rel="noopener">자세히 보기</a>' : '');
      } else {
        c.innerHTML =
          '<div class="popup-emoji">🐰</div>' +
          '<h2 class="popup-title">이벤트가 종료되었습니다</h2>' +
          '<div class="popup-desc">여기양 위치 공유 이벤트가 종료되었습니다.\n그동안 함께해 주셔서 감사합니다 💜</div>' +
          (POPUP_INFO.link ? '<a class="popup-btn" href="' + esc(POPUP_INFO.link) + '" target="_blank" rel="noopener">OFF BEAUTY 보러가기</a>' : '');
      }
      document.getElementById("popupOverlay").classList.add("show");
    }
    function closeModal() {
      // 오버레이 클릭 또는 × 버튼 → 닫기 (박스 내부 클릭은 stopPropagation으로 안 닫힘)
      document.getElementById("popupOverlay").classList.remove("show");
    }
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function render(loc) {
      const latlng = [loc.lat, loc.lng];
      lastLatLng = latlng;
      if (!marker) {
        marker = L.marker(latlng, { icon: sheepIcon }).addTo(map).bindPopup("🐑 호스트");
        accCircle = L.circle(latlng, { radius: loc.accuracy || 30, color: "#4ecdc4", fillOpacity: 0.12 }).addTo(map);
      } else {
        marker.setLatLng(latlng);
        accCircle.setLatLng(latlng).setRadius(loc.accuracy || 30);
      }
      if (autoFollow) map.setView(latlng, Math.max(map.getZoom(), 16));
      const t = new Date(loc.ts || Date.now()).toLocaleTimeString("ko-KR");
      document.getElementById("meta").textContent =
        `갱신: ${t} · 정확도 ±${Math.round(loc.accuracy || 0)}m`;
    }

    function setStatus(online) {
      document.getElementById("dot").classList.toggle("live", online);
      document.getElementById("statusText").textContent =
        online ? "실시간 추적 중" : "호스트가 공유를 중지했습니다";
    }

    function recenter() {
      autoFollow = true;
      if (lastLatLng) map.setView(lastLatLng, 16);
    }
  </script>
</body>
</html>
